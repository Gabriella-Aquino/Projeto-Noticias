<article class="container">
    <div class="city-degrees">
        <span style="font-weight: 500;">{{infos()?.local}}</span>
        <div class="degrees">
            <span style="color: #67D0FE;">{{infos()?.minDegree}}º</span>
            <span style="color: #FF6D6D;">{{infos()?.maxDegree}}º</span>
        </div>
    </div>
    <div class="season-weather">
        <span>{{infos()?.season}}</span>
        <span>{{infos()?.weather}}</span>
    </div>
</article>
