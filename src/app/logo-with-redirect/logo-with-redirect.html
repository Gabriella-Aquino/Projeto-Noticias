<a routerLink="/">
  <div class="logo-container">
    <app-image
      [src]="variant() === 'white' ? 'assets/icons/logo-white.svg' : 'assets/icons/logo-black.svg'"
      [alt]="'Logo'"
      [width]="100"
      [height]="100"
    >
    </app-image>
    @if (showTitle()) {
      <span [class.white-text]="variant() === 'white'">Notícias</span>
    }
  </div>
</a>
