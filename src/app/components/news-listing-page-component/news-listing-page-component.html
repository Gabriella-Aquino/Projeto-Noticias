<div class="container">
  <div class="content">
    @if (page() === 'columnist') {
      <div class="headerColumnist">
        <img [src]="imageToRender()" [alt]="page() === 'columnist' && 'Avatar do colunista'" />
      </div>
      <span class="titleColumnist">{{ title() }} </span>
      <app-logo-with-redirect class="logoAbsolute"/>
    } @else {
      <app-logo-with-redirect [title]="title()"/>
    }
    <div class="newsContainer"></div>
  </div>
</div>
