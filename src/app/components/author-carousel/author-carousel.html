<nz-carousel [nzEffect]="'scrollx'" nzArrows>
  @for (group of groupedItems; track $index) {
    <div nz-carousel-content>
      <div class="card-wrapper">
        @for (item of group; track item.id) {
          <div class="custom-card">
            <img src="{{item.avatar}}" alt="">
          </div>
        }
      </div>
    </div>
  }
</nz-carousel>
